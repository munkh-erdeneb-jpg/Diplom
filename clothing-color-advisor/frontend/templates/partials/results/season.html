<div class="result-card season-card">
    <div class="card-header">
        <h3 data-i18n="season.title">Таны өнгийн улирал</h3>
    </div>
    <div class="season-content">
        <div class="season-hero-badge" id="seasonBadge">
            <span class="season-emoji" id="seasonEmoji"></span>
            <div class="season-text-block">
                <span class="season-name" id="seasonName"></span>
                <span class="season-en-name" id="seasonEnName"></span>
            </div>
        </div>
        <div class="season-palette-row" id="seasonPalette"></div>
        <p class="season-description" id="seasonDescription"></p>
        <p class="season-characteristics" id="seasonCharacteristics"></p>
        <div class="ml-confidence" id="mlConfidence" style="display:none;">
            <h4 data-i18n="ml.title">ML загварын итгэлцэл</h4>
            <div class="confidence-bars" id="confidenceBars"></div>
        </div>
    </div>
</div>
